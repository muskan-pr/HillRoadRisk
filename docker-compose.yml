version: "3.9"

services:
  # PostgreSQL + PostGIS database
  db:
    image: postgis/postgis:16-3.4
    container_name: hillrisk-db
    environment:
      POSTGRES_DB: hillroadrisk
      POSTGRES_USER: hillrisk
      POSTGRES_PASSWORD: hillrisk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hillrisk -d hillroadrisk"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hillrisk-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://hillrisk:hillrisk@db:5432/hillroadrisk
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
    driver: local
